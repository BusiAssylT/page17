<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Проверка билетов · PAGE17</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="ticketing.css"></head><body><main class="shell admin-shell"><header class="topbar"><a class="brand" href="index.html"><span class="brand-mark">17</span>PAGE17 · Организаторам</a><button class="button secondary hidden" id="logout">Выйти</button></header><div id="admin-notice" class="hidden" aria-live="polite"></div><form class="panel form" id="admin-login"><h2>Вход организатора</h2><label class="field">Email<input name="email" type="email" autocomplete="email" required></label><label class="field">Пароль<input name="password" type="password" autocomplete="current-password" required></label><button class="button">Войти</button></form><section id="admin-panel" class="hidden"><div class="admin-grid"><div class="stat"><span>Заявок</span><strong id="stat-total">0</strong></div><div class="stat"><span>Билетов выдано</span><strong id="stat-issued">0</strong></div><div class="stat"><span>Прошли</span><strong id="stat-used">0</strong></div></div><section class="panel scanner"><h2>Проверить билет</h2><p>Сканирование сначала показывает подлинность и статус билета. Вход фиксируется только после отдельного подтверждения.</p><form class="scanner-row" id="checkin-form"><input id="checkin-token" placeholder="Код или ссылка билета" required><button class="button">Проверить</button></form><div id="checkin-notice" class="hidden"></div><button class="button hidden" id="confirm-checkin" type="button">Пропустить гостя</button></section><h2>Заявки</h2><div class="applications" id="applications"></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="ticketing.js"></script></body></html>
